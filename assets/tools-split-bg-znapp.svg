<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <title>ZNAPP roadside background</title>
  <defs>
    <linearGradient id="znBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE9F4"/>
      <stop offset="50%" stop-color="#E2DAF0"/>
      <stop offset="100%" stop-color="#D9CBE8"/>
    </linearGradient>

    <radialGradient id="znPurple" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#843DB3" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#843DB3" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="znTeal" cx="88%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#30D5C8" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#30D5C8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2038" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#141018" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30D5C8" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#9D6ABA" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#843DB3" stop-opacity="0.20"/>
    </linearGradient>

    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#000" opacity="0.03"/>
    </pattern>

    <linearGradient id="lane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9D6ABA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#30D5C8" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Sky / backdrop -->
  <rect width="100%" height="100%" fill="url(#znBg)"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <ellipse cx="320" cy="220" rx="520" ry="420" fill="url(#znPurple)"/>
  <ellipse cx="1280" cy="760" rx="520" ry="430" fill="url(#znTeal)"/>

  <!-- Grass / shoulders -->
  <path d="M0 1000 L320 470 L560 470 L420 1000 Z" fill="#30D5C8" opacity="0.06"/>
  <path d="M1600 1000 L1280 470 L1040 470 L1180 1000 Z" fill="#843DB3" opacity="0.06"/>

  <!-- Road (perspective) -->
  <path d="M330 1000 L600 420 L1000 420 L1270 1000 Z" fill="url(#road)"/>

  <!-- Road edges -->
  <path d="M330 1000 L600 420" stroke="url(#edge)" stroke-width="18" stroke-linecap="round" opacity="0.55"/>
  <path d="M1270 1000 L1000 420" stroke="url(#edge)" stroke-width="18" stroke-linecap="round" opacity="0.55"/>

  <!-- Center lane lines (dashed) -->
  <path d="M700 420 L800 1000" stroke="url(#lane)" stroke-width="10" stroke-dasharray="18 22" stroke-linecap="round" opacity="0.55"/>

  <!-- A couple of lane stripes -->
  <path d="M650 520 L760 1000" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="8" stroke-dasharray="10 18" stroke-linecap="round"/>
  <path d="M950 520 L840 1000" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="8" stroke-dasharray="10 18" stroke-linecap="round"/>

  <!-- Subtle comic “route” stroke (like navigation) -->
  <path d="M-60 760 C 260 640, 430 900, 720 660 S 1180 520, 1680 400" fill="none" stroke="#9D6ABA" stroke-opacity="0.28" stroke-width="18" stroke-linecap="round"/>
  <path d="M-60 760 C 260 640, 430 900, 720 660 S 1180 520, 1680 400" fill="none" stroke="#30D5C8" stroke-opacity="0.24" stroke-width="10" stroke-linecap="round"/>

  <!-- Side pins / roadside markers -->
  <circle cx="510" cy="700" r="10" fill="#843DB3" opacity="0.45"/>
  <circle cx="1120" cy="620" r="9" fill="#30D5C8" opacity="0.35"/>
  <circle cx="860" cy="560" r="8" fill="#9D6ABA" opacity="0.35"/>

  <!-- Ground band -->
  <path d="M0 840 Q 450 760 800 810 T 1600 760 V1000 H0 Z" fill="#843DB3" opacity="0.05"/>
</svg>